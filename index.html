<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>ハムスター家系図</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF3E8;
    --cream-deep:#F1E6D3;
    --ink:#3E2F24;
    --ink-soft:#6B5A4C;
    --line:#DCC9AE;
    --normal:#C98A4B;
    --normal-bg:#F6E5D1;
    --sapphire:#6E8FAE;
    --sapphire-bg:#E4EBF2;
    --moon:#9683B0;
    --moon-bg:#EAE3F1;
    --mocha:#8B5E3C;
    --mocha-bg:#EBDECE;
    --gold:#D9A441;
    --male:#7C9CB8;
    --female:#D98499;
    --card-w:168px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 12% 8%, rgba(217,164,65,0.10), transparent 45%),
      radial-gradient(circle at 90% 85%, rgba(140,94,60,0.10), transparent 40%),
      var(--cream);
    color:var(--ink);
    font-family:'Noto Sans JP', sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1280px;margin:0 auto;padding:28px 20px 60px;}

  /* ---------- HEADER ---------- */
  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
    border-bottom:2px solid var(--line);
    padding-bottom:18px;
    margin-bottom:22px;
  }
  .title-block .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    color:var(--ink-soft);
    font-weight:600;
    display:flex;align-items:center;gap:6px;
  }
  .title-block h1{
    font-family:'Zen Maru Gothic', sans-serif;
    font-weight:900;
    font-size:30px;
    margin:2px 0 0;
    letter-spacing:.02em;
  }
  .title-block h1 span{color:var(--mocha);}
  .stats-strip{display:flex;gap:18px;flex-wrap:wrap;}
  .stat{
    background:#fff;
    border:1px solid var(--line);
    border-radius:14px;
    padding:8px 16px;
    text-align:center;
    min-width:78px;
  }
  .stat b{display:block;font-family:'Zen Maru Gothic';font-size:20px;color:var(--mocha);}
  .stat span{font-size:11px;color:var(--ink-soft);}

  /* ---------- SEARCH ---------- */
  .search-row{
    display:flex;
    gap:12px;
    align-items:center;
    margin-bottom:22px;
    flex-wrap:wrap;
    position:relative;
  }
  .search-box{position:relative;flex:1;min-width:240px;max-width:420px;}
  .search-box input{
    width:100%;
    padding:11px 16px 11px 40px;
    border-radius:999px;
    border:2px solid var(--line);
    background:#fff;
    font-family:'Noto Sans JP';
    font-size:14px;
    color:var(--ink);
    outline:none;
    transition:border-color .15s;
  }
  .search-box input:focus{border-color:var(--mocha);}
  .search-box::before{
    content:"🔍";
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    font-size:14px;opacity:.6;
  }
  .suggestions{
    position:absolute;top:calc(100% + 6px);left:0;right:0;
    background:#fff;border:1px solid var(--line);border-radius:14px;
    box-shadow:0 12px 28px rgba(62,47,36,0.14);
    max-height:280px;overflow-y:auto;z-index:50;
  }
  .suggestions button{
    display:flex;align-items:center;gap:8px;
    width:100%;text-align:left;padding:9px 14px;
    background:none;border:none;border-bottom:1px solid var(--cream-deep);
    font-family:'Noto Sans JP';font-size:13.5px;color:var(--ink);cursor:pointer;
  }
  .suggestions button:last-child{border-bottom:none;}
  .suggestions button:hover{background:var(--cream-deep);}
  .suggestions .g{font-size:11px;color:var(--ink-soft);margin-left:auto;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);align-items:center;}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px;}

  /* ---------- BROWSE BY GENERATION ---------- */
  .browse-row{margin-bottom:22px;}
  .browse-label{font-size:12px;color:var(--ink-soft);font-weight:600;margin-bottom:8px;letter-spacing:.04em;}
  .gen-buttons{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
  .gen-btn{
    padding:7px 16px;border-radius:999px;border:2px solid var(--line);background:#fff;
    font-family:'Zen Maru Gothic';font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;
    transition:all .12s;
  }
  .gen-btn:hover{border-color:var(--mocha);color:var(--mocha);}
  .gen-btn.active{background:var(--mocha);border-color:var(--mocha);color:#fff;}
  .name-buttons{
    display:flex;gap:7px;flex-wrap:wrap;padding:14px;
    background:var(--cream-deep);border-radius:14px;border:1px solid var(--line);
  }
  .name-btn{
    padding:6px 13px;border-radius:999px;border:1.5px solid var(--line);background:#fff;
    font-family:'Noto Sans JP';font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;
    display:flex;align-items:center;gap:6px;transition:border-color .12s;
  }
  .name-btn::before{content:'';width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .name-btn.male::before{background:var(--male);}
  .name-btn.female::before{background:var(--female);}
  .name-btn:hover{border-color:var(--mocha);}
  .name-btn.active{border-color:var(--mocha);background:var(--normal-bg);}

  /* ---------- TREE AREA ---------- */
  .tree-shell{
    background:#fff;
    border:1px solid var(--line);
    border-radius:22px;
    padding:26px 22px 30px;
    overflow-x:auto;
    position:relative;
    box-shadow:0 10px 30px rgba(62,47,36,0.06);
  }
  .empty-msg{
    text-align:center;padding:60px 20px;color:var(--ink-soft);font-size:14px;
  }
  #svgLines{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}
  .scroll-hint{display:none;}
  .columns{
    display:flex;
    gap:34px;
    position:relative;
    min-width:max-content;
    padding-top:6px;
  }
  .col{
    display:flex;
    flex-direction:column;
    gap:22px;
    min-width:var(--card-w);
  }
  .col-label{
    font-family:'Zen Maru Gothic';
    font-size:12px;
    font-weight:700;
    color:var(--ink-soft);
    text-align:center;
    padding-bottom:8px;
    border-bottom:2px dashed var(--line);
    margin-bottom:4px;
    letter-spacing:.05em;
  }
  .col.self .col-label{color:var(--mocha);border-bottom-color:var(--mocha);}
  .card-slot{display:flex;flex-direction:column;justify-content:center;min-height:78px;}

  .card{
    width:var(--card-w);
    background:var(--cream);
    border:2px solid var(--line);
    border-radius:16px;
    padding:10px 12px;
    cursor:pointer;
    position:relative;
    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;
  }
  .card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(62,47,36,0.14);}
  .card.selected{
    border-color:var(--mocha);
    background:#fff;
    box-shadow:0 0 0 3px rgba(139,94,60,0.15), 0 8px 20px rgba(62,47,36,0.16);
  }
  .card.departed{opacity:.72;}
  .card.spouse{
    border-color:var(--gold);
    background:#fff;
  }
  .spouse-tag{
    position:absolute;top:-9px;right:10px;
    background:var(--gold);color:#fff;
    font-size:9px;font-weight:700;padding:1.5px 8px;border-radius:999px;
    letter-spacing:.03em;
  }
  .couple-connector{
    display:flex;align-items:center;justify-content:center;
    font-size:13px;margin:-8px 0;line-height:1;
    color:var(--gold);
  }
  .card .top-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
  .card .gender-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .card .gender-dot.male{background:var(--male);}
  .card .gender-dot.female{background:var(--female);}
  .card .name{
    font-family:'Zen Maru Gothic';
    font-weight:700;
    font-size:14.5px;
    line-height:1.2;
    color:var(--ink);
  }
  .card .no{font-size:9.5px;color:var(--ink-soft);margin-left:auto;}
  .card .coat-pill{
    display:inline-block;
    font-size:9.5px;
    padding:1.5px 8px;
    border-radius:999px;
    margin-top:3px;
    font-weight:600;
  }
  .card .meta{font-size:10px;color:var(--ink-soft);margin-top:4px;line-height:1.5;}
  .card .rip{font-size:9.5px;color:#B0846F;margin-top:2px;}
  .card .no-data{
    width:var(--card-w);
    border:2px dashed var(--line);
    border-radius:16px;
    padding:14px 10px;
    text-align:center;
    font-size:11px;
    color:#c2b39c;
  }

  .base-normal{background:var(--normal-bg);color:var(--normal);}
  .base-sapphire{background:var(--sapphire-bg);color:var(--sapphire);}
  .base-moon{background:var(--moon-bg);color:var(--moon);}
  .base-mocha{background:var(--mocha-bg);color:var(--mocha);}

  /* ---------- DETAIL PANEL ---------- */
  .detail-panel{
    margin-top:24px;
    background:linear-gradient(135deg,#fff,var(--cream-deep));
    border:1px solid var(--line);
    border-radius:20px;
    padding:22px 26px;
    display:none;
  }
  .detail-panel.show{display:block;}
  .detail-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
  .detail-head h2{
    font-family:'Zen Maru Gothic';font-size:22px;margin:0;font-weight:900;
  }
  .detail-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px 22px;
    font-size:13px;
  }
  .detail-grid div b{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:600;margin-bottom:2px;letter-spacing:.03em;}
  .badge{
    display:inline-block;padding:2px 10px;border-radius:999px;font-size:11.5px;font-weight:700;
  }
  .badge.alive{background:#E4F0E1;color:#5C8A54;}
  .badge.departed{background:#F1DDD4;color:#B0684B;}

  footer{text-align:center;color:var(--ink-soft);font-size:11.5px;margin-top:26px;}

  @media (max-width:640px){
    :root{ --card-w:132px; }
    .wrap{padding:16px 12px 40px;}
    header{
      flex-direction:column;
      align-items:flex-start;
      gap:12px;
      padding-bottom:14px;
      margin-bottom:16px;
    }
    .title-block h1{font-size:22px;}
    .stats-strip{gap:10px;width:100%;}
    .stat{padding:6px 12px;min-width:64px;flex:1;}
    .stat b{font-size:17px;}

    .search-row{gap:10px;}
    .search-box{max-width:none;width:100%;}
    .legend{font-size:10.5px;gap:8px 12px;}

    .browse-row{margin-bottom:16px;}
    .gen-buttons{gap:6px;}
    .gen-btn{padding:7px 12px;font-size:11.5px;}
    .name-buttons{padding:10px;gap:6px;}
    .name-btn{padding:7px 11px;font-size:12px;}

    .tree-shell{padding:16px 10px 20px;border-radius:16px;}
    .scroll-hint.show{
      display:flex;align-items:center;justify-content:center;gap:6px;
      font-size:11px;color:var(--ink-soft);margin:-2px 0 12px;
    }
    .columns{gap:20px;}
    .col{gap:14px;}
    .col-label{font-size:10.5px;padding-bottom:6px;}
    .card{padding:8px 9px;border-radius:12px;}
    .card .name{font-size:13px;}
    .card .no{font-size:8.5px;}
    .card .coat-pill{font-size:8.5px;padding:1px 6px;}
    .card .meta{font-size:9px;}
    .card .rip{font-size:8.5px;}
    .card-slot{min-height:64px;}
    .spouse-tag{font-size:8px;padding:1px 6px;top:-8px;right:8px;}

    .detail-panel{padding:16px 16px;border-radius:16px;margin-top:16px;}
    .detail-head h2{font-size:19px;}
    .detail-grid{grid-template-columns:1fr 1fr;gap:10px 14px;font-size:12px;}
  }

  @media (max-width:400px){
    :root{ --card-w:112px; }
    .detail-grid{grid-template-columns:1fr;}
    .stats-strip{gap:8px;}
  }
</style>
</head>

  <header>

  <div class="search-row">

      <div class="suggestions" id="suggestions" style="display:none;"></div>
    </div>
    <div class="legend">
      <span><i style="background:var(--normal)"></i>ノーマル系</span>
      <span><i style="background:var(--sapphire)"></i>サファイア系</span>
      <span><i style="background:var(--moon)"></i>ムーン系</span>
      <span><i style="background:var(--mocha)"></i>モカ系</span>

  </div>

  <div class="browse-row">
    <div class="browse-label">世代からさがす</div>
    <div class="gen-buttons" id="genButtons"></div>
    <div class="name-buttons" id="nameButtons" style="display:none;"></div>
  </div>

  <div class="tree-shell" id="treeShell">
    <div class="empty-msg" id="emptyMsg">上の検索ボックスから、家系図を見たいハムスターを選んでね 🐹</div>
    <svg id="svgLines"></svg>
    <div class="scroll-hint" id="scrollHint">← 横にスクロールできます →</div>
    <div class="columns" id="columns" style="display:none;"></div>
  </div>

  <div class="detail-panel" id="detailPanel"></div>

  <footer>93頭のデータをもとに生成</footer>
</div>

const byName = {};

// children lookup
const childrenOf = {};
DATA.forEach(d => {
  [d.father, d.mother].forEach(p => {
    if(p){
      if(!childrenOf[p]) childrenOf[p] = [];
      if(!childrenOf[p].includes(d.name)) childrenOf[p].push(d.name);
    }
  });
});

const baseClass = {"ノーマル":"base-normal","サファイア":"base-sapphire","ムーン":"base-moon","モカ":"base-mocha"};

// ---------- browse by generation ----------
function naturalGenSort(a,b){
  const na = parseInt((a.match(/\d+/)||[0])[0]);
  const nb = parseInt((b.match(/\d+/)||[0])[0]);
  return na - nb;
}

function renderGenButtons(){
  const gens = [...new Set(DATA.map(d=>d.gen))].sort(naturalGenSort);
  document.getElementById('genButtons').innerHTML = gens.map(g =>
    `<button class="gen-btn" data-gen="${g}">${g}</button>`
  ).join('');
  document.querySelectorAll('.gen-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.gen-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderNameButtons(btn.dataset.gen);
    });
  });
}

function renderNameButtons(gen){
  const members = DATA.filter(d => d.gen === gen).sort((a,b) => a.no - b.no);
  const box = document.getElementById('nameButtons');
  box.style.display = 'flex';
  box.innerHTML = members.map(d =>
    `<button class="name-btn ${d.gender==='男子'?'male':'female'} ${d.name===selectedName?'active':''}" data-name="${d.name}">${d.name}</button>`
  ).join('');
  box.querySelectorAll('.name-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      box.querySelectorAll('.name-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectHamster(btn.dataset.name);
    });
  });
}

renderGenButtons();

// ---------- tree building ----------
function getAncestorLevel(name, depth){
  // returns array of {name or null} for a given ancestor depth (1=parents,2=grandparents,3=great-grandparents)
  let level = [name];
  for(let i=0;i<depth;i++){
    let next = [];
    level.forEach(n => {
      const rec = n ? byName[n] : null;
      next.push(rec ? rec.father : null);
      next.push(rec ? rec.mother : null);
    });
    level = next;
  }
  return level;
}

function getDescendantLevels(name, maxDepth){
  // BFS collecting unique descendant names per depth level (dedup)
  let levels = [[name]];
  let seen = new Set([name]);
  for(let d=1; d<=maxDepth; d++){
    let prev = levels[d-1];
    let cur = [];
    prev.forEach(n => {
      (childrenOf[n]||[]).forEach(c => {
        if(!seen.has(c)){ seen.add(c); cur.push(c); }
      });
    });
    levels.push(cur);
  }
  return levels;
}

function formatDate(s){
  if(!s) return '';
  return s.replace(/\//g,'.');
}

function cardHTML(name, type){
  if(!name){
    return `<div class="no-data">記録なし</div>`;
  }
  const d = byName[name];
  if(!d){
    return `<div class="no-data">${name}<br>（台帳外）</div>`;
  }
  const bc = baseClass[d.base] || 'base-normal';
  const cls = type === 'self' ? 'selected' : (type === 'spouse' ? 'spouse' : '');
  return `
    <div class="card ${cls}" data-name="${d.name}">
      ${type==='spouse' ? '<span class="spouse-tag">配偶者</span>' : ''}
      <div class="top-row">
        <span class="gender-dot ${d.gender==='男子'?'male':'female'}"></span>
        <span class="name">${d.name}</span>
        <span class="no">No.${d.no}</span>
      </div>
      <span class="coat-pill ${bc}">${d.coat}</span>
      <div class="meta">
        誕生 ${formatDate(d.birth)}
      </div>
    </div>
  `;
}

function getSpouses(name){
  const spouseSet = new Set();
  DATA.forEach(d => {
    if(d.father === name && d.mother) spouseSet.add(d.mother);
    if(d.mother === name && d.father) spouseSet.add(d.father);
  });
  return [...spouseSet];
}

function selectHamster(name){
  if(!byName[name]) return;
  selectedName = name;
  document.getElementById('emptyMsg').style.display = 'none';
  document.getElementById('columns').style.display = 'flex';
  document.getElementById('scrollHint').classList.add('show');
  buildTree(name);
  renderDetail(name);
}

function buildTree(name){
  const columnsEl = document.getElementById('columns');
  const ancDepth = 3, desDepth = 3;

  // ancestor levels (3,2,1) then self then descendant levels (1,2,3)
  const ancestorCols = [];
  for(let depth=ancDepth; depth>=1; depth--){
    ancestorCols.push(getAncestorLevel(name, depth));
  }
  const descLevels = getDescendantLevels(name, desDepth);

  const colDefs = [];
  const ancLabels = ['ひぃひぃ祖父母','ひぃ祖父母','祖父母'];
  ancestorCols.forEach((lv, i) => colDefs.push({label: ancLabels[i], names: lv, self:false}));
  const spouses = getSpouses(name);
  colDefs.push({label: '選択中', names: [name, ...spouses], self:true, primaryName:name});
  const desLabels = ['子','孫','ひ孫'];
  for(let d=1; d<=desDepth; d++){
    colDefs.push({label: desLabels[d-1], names: descLevels[d], self:false});
  }

  columnsEl.innerHTML = colDefs.map(cd => `
    <div class="col ${cd.self?'self':''}">
      <div class="col-label">${cd.label}</div>
      ${
        cd.names.length === 0
        ? `<div class="card-slot"><div class="no-data">記録なし</div></div>`
        : cd.names.map((n,i) => {
            const type = cd.self ? (n === cd.primaryName ? 'self' : 'spouse') : undefined;
            const connector = (cd.self && i > 0) ? `<div class="couple-connector">💛</div>` : '';
            return `${connector}<div class="card-slot">${cardHTML(n, type)}</div>`;
          }).join('')
      }
    </div>
  `).join('');

  columnsEl.querySelectorAll('.card').forEach(el => {
    el.addEventListener('click', () => selectHamster(el.dataset.name));
  });

  requestAnimationFrame(drawLines);
}

function drawLines(){
  const svg = document.getElementById('svgLines');
  const shell = document.getElementById('treeShell');
  const shellRect = shell.getBoundingClientRect();
  const columnsEl = document.getElementById('columns');
  svg.setAttribute('width', columnsEl.scrollWidth);
  svg.setAttribute('height', columnsEl.scrollHeight + 20);
  svg.innerHTML = '';

  const cards = Array.from(document.querySelectorAll('.card'));
  const posByName = {};
  cards.forEach(c => {
    const r = c.getBoundingClientRect();
    posByName[c.dataset.name] = {
      cx: r.left - shellRect.left + shell.scrollLeft + r.width/2,
      top: r.top - shellRect.top + shell.scrollTop,
      bottom: r.top - shellRect.top + shell.scrollTop + r.height,
      cy: r.top - shellRect.top + shell.scrollTop + r.height/2,
      left: r.left - shellRect.left + shell.scrollLeft,
      right: r.left - shellRect.left + shell.scrollLeft + r.width
    };
  });

  const ns = "http://www.w3.org/2000/svg";
  function line(x1,y1,x2,y2,color,width){
    const el = document.createElementNS(ns,'path');
    const mx = (x1+x2)/2;
    el.setAttribute('d', `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
    el.setAttribute('stroke', color || '#DCC9AE');
    el.setAttribute('stroke-width', width || 1.6);
    el.setAttribute('fill', 'none');
    el.setAttribute('opacity', '0.85');
    svg.appendChild(el);
  }

  DATA.forEach(d => {
    const childPos = posByName[d.name];
    if(!childPos) return;
    [d.father, d.mother].forEach(p => {
      const parentPos = p ? posByName[p] : null;
      if(parentPos){
        line(parentPos.right, parentPos.cy, childPos.left, childPos.cy, '#C7AD87', 1.6);
      }
    });
  });
}

window.addEventListener('resize', () => { if(selectedName) drawLines(); });

function renderDetail(name){
  const d = byName[name];
  const panel = document.getElementById('detailPanel');
  panel.classList.add('show');
  const bc = baseClass[d.base] || 'base-normal';
  const kids = childrenOf[d.name] || [];
  panel.innerHTML = `
    <div class="detail-head">
      <h2>${d.name}</h2>
      <span class="coat-pill ${bc}" style="font-size:12px;padding:3px 12px;">${d.coat}</span>
    </div>
    <div class="detail-grid">
      <div><b>個体No.</b>${d.no}</div>
      <div><b>世代</b>${d.gen}</div>
      <div><b>性別</b>${d.gender||'-'}</div>
      <div><b>誕生日</b>${formatDate(d.birth)||'-'}</div>
      <div><b>ベースカラー</b>${d.base||'-'}</div>
      <div><b>父</b>${d.father||'記録なし'}</div>
      <div><b>母</b>${d.mother||'記録なし'}</div>
      <div><b>子（${kids.length}頭）</b>${kids.length ? kids.join('、') : 'なし'}</div>
      <div><b>ピーク体重</b>${d.peakWeight ? d.peakWeight+'g' : '-'}</div>
      <div><b>出身</b>${d.origin || '-'}</div>
      ${d.note ? `<div><b>備考</b>${d.note}</div>` : ''}
    </div>
  `;
}
